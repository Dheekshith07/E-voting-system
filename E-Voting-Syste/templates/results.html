<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Election Results</title>
    <style>
        body { font-family: Arial; text-align: center; background: #ecf0f1; padding-top: 50px; }
        table { margin: 0 auto; border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #7f8c8d; padding: 10px; }
        th { background-color: #2980b9; color: white; }
        .logout { background: red; color: white; padding: 10px 20px; border-radius: 5px; border: none; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Election Results</h2>
    <table>
        <tr><th>Candidate</th><th>Total Votes</th></tr>
        {% for i in range(labels|length) %}
        <tr><td>{{ labels[i] }}</td><td>{{ votes[i] }}</td></tr>
        {% endfor %}
    </table>
    <br>
    <a href="/logout"><button class="logout">Logout</button></a>
</body>
</html>
